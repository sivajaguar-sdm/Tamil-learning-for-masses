
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tamil Trainer 4.1</title>
<style>
body{margin:0;font-family:system-ui;background:#f5f3fb}
.wrap{max-width:520px;margin:auto;padding:16px}
h2{text-align:center;margin:8px 0;color:#5b2bbd}
.strip{display:flex;overflow-x:auto;gap:10px;padding:10px 4px 16px;scrollbar-width:none}
.strip::-webkit-scrollbar{display:none}
.dot{min-width:54px;height:54px;border-radius:27px;border:2px solid #cdbdf3;
display:flex;align-items:center;justify-content:center;
font-size:28px;font-weight:bold;color:#5b2bbd;background:#fff;
transition:.25s;cursor:pointer;flex-shrink:0}
.dot.active{background:#5b2bbd;color:#fff;transform:scale(1.2);border-color:#5b2bbd}
.card{background:#fff;border-radius:22px;padding:18px;box-shadow:0 8px 20px rgba(0,0,0,.08)}
.big{font-size:170px;text-align:center;color:#5b2bbd;cursor:pointer;line-height:1.1}
.tap{text-align:center;color:#777;margin-top:-10px}
button{width:100%;padding:15px;border:none;border-radius:16px;font-size:20px;font-weight:bold;margin-top:12px}
.listen{background:#5b2bbd;color:#fff}
.record{background:#0b9f57;color:#fff}
.nav{display:flex;gap:10px;margin-top:14px}
.nav button{margin:0}
.prev{background:#ececec}.next{background:#5b2bbd;color:#fff}
</style>
</head>
<body>
<div class="wrap">
<h2>Tamil Pronunciation Trainer 4.1</h2>
<div class="strip" id="strip"></div>
<div class="card">
<div id="big" class="big"></div>
<div class="tap">👆 Tap the letter to hear it</div>
<button class="listen" onclick="speak()">🔊 Listen</button>
<button class="record" onclick="alert('Recorder will be added in next version')">🎤 Record</button>
<div class="nav">
<button class="prev" onclick="move(-1)">← Previous</button>
<button class="next" onclick="move(1)">Next →</button>
</div>
</div>
</div>
<script>
const letters=["அ","ஆ","இ","ஈ","உ","ஊ","எ","ஏ","ஐ","ஒ","ஓ","ஔ"];
let index=0;
const strip=document.getElementById("strip");
const big=document.getElementById("big");
letters.forEach((l,i)=>{
 let d=document.createElement("div");
 d.className="dot";
 d.textContent=l;
 d.onclick=()=>{index=i;render();speak();}
 strip.appendChild(d);
});
function render(){
 big.textContent=letters[index];
 [...strip.children].forEach((c,i)=>c.classList.toggle("active",i===index));
 strip.children[index].scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});
}
function move(d){
 index=Math.max(0,Math.min(letters.length-1,index+d));
 render(); speak();
}
function speak(){
 speechSynthesis.cancel();
 let u=new SpeechSynthesisUtterance(letters[index]);
 u.lang="ta-IN";
 let v=speechSynthesis.getVoices().find(x=>x.lang&&x.lang.startsWith("ta"));
 if(v)u.voice=v;
 speechSynthesis.speak(u);
}
big.onclick=speak;
let sx=0;
document.querySelector(".card").ontouchstart=e=>sx=e.touches[0].clientX;
document.querySelector(".card").ontouchend=e=>{
 let dx=e.changedTouches[0].clientX-sx;
 if(Math.abs(dx)>60) move(dx<0?1:-1);
};
render();
</script>
</body>
</html>
